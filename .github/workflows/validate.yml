name: Validate SFTPGo Config

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:        # allow manual trigger from Actions tab

concurrency:
  group: sftpgo-validate-${{ github.ref }}
  cancel-in-progress: true  # avoid racing simultaneous pushes against the live API

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Static analysis — no secrets needed, runs fast
  # ---------------------------------------------------------------------------
  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint sftpgo_setup.sh
        run: shellcheck -S warning sftpgo_setup.sh

      - name: Lint validate_api.sh
        run: shellcheck -S warning validate_api.sh

  # ---------------------------------------------------------------------------
  # Job 2: Live API validation against neoncovenant.appboxes.co
  # Requires secrets: SFTPGO_ADMIN_PASS, SFTPGO_USER_PASS
  # ---------------------------------------------------------------------------
  api-validate:
    name: Live API Checks
    runs-on: ubuntu-latest
    needs: lint                 # only run if shellcheck passes
    env:
      SFTPGO_ADMIN_URL: "https://neoncovenant.appboxes.co"
      ADMIN_USER: "admin"
      SFTPGO_USER: "jofthev"
      FOLDER_NAME: "jofthev_data"
      FOLDER_LOCAL_PATH: "/home/appbox/data/jofthev"
      FOLDER_VIRTUAL_PATH: "/data"
      EXPECTED_QUOTA_SIZE: "1073741824"     # 1 GiB
      EXPECTED_MAX_UPLOAD: "1073741824"     # 1 GiB

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y curl jq

      # -----------------------------------------------------------------------
      # Step 1: Auth regression — verify admin token endpoint responds
      # -----------------------------------------------------------------------
      - name: "[1] Auth — obtain admin JWT"
        id: auth
        env:
          ADMIN_PASS: ${{ secrets.SFTPGO_ADMIN_PASS }}
        run: |
          echo "Testing admin auth against ${SFTPGO_ADMIN_URL}/api/v2/token..."
          RESPONSE=$(curl -sf --max-time 15 \
            -u "${ADMIN_USER}:${ADMIN_PASS}" \
            "${SFTPGO_ADMIN_URL}/api/v2/token")

          TOKEN=$(echo "${RESPONSE}" | jq -r '.access_token // empty')

          if [[ -z "${TOKEN}" ]]; then
            echo "::error::Auth failed — no access_token in response"
            echo "Response: ${RESPONSE}"
            exit 1
          fi

          # Mask token in all subsequent log output
          echo "::add-mask::${TOKEN}"
          echo "ADMIN_TOKEN=${TOKEN}" >> "$GITHUB_ENV"
          echo "Admin auth: OK"

      # -----------------------------------------------------------------------
      # Step 2: Host reachability — confirm API version endpoint is alive
      # -----------------------------------------------------------------------
      - name: "[2] Reachability — API version check"
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 10 \
            "${SFTPGO_ADMIN_URL}/api/v2/version")
          if [[ "${STATUS}" != "200" ]]; then
            echo "::error::API version endpoint returned HTTP ${STATUS} — host may be down"
            exit 1
          fi
          echo "Host reachable: HTTP ${STATUS}"

      # -----------------------------------------------------------------------
      # Step 3: Virtual folder existence check
      # -----------------------------------------------------------------------
      - name: "[3] Virtual folder — confirm '${FOLDER_NAME}' exists"
        run: |
          RESPONSE=$(curl -sf --max-time 15 \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            "${SFTPGO_ADMIN_URL}/api/v2/folders/${FOLDER_NAME}" || echo "NOT_FOUND")

          if echo "${RESPONSE}" | jq -e '.name' &>/dev/null; then
            MAPPED=$(echo "${RESPONSE}" | jq -r '.mapped_path')
            echo "Folder '${FOLDER_NAME}' exists. Mapped path: ${MAPPED}"
            if [[ "${MAPPED}" != "${FOLDER_LOCAL_PATH}" ]]; then
              echo "::warning::Mapped path mismatch — got '${MAPPED}', expected '${FOLDER_LOCAL_PATH}'"
            fi
          else
            echo "::error::Virtual folder '${FOLDER_NAME}' not found. Run sftpgo_setup.sh to create it."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Step 4: User existence + quota assertions
      # -----------------------------------------------------------------------
      - name: "[4] User config — quota and virtual folder assertions"
        run: |
          USER_JSON=$(curl -sf --max-time 15 \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            "${SFTPGO_ADMIN_URL}/api/v2/users/${SFTPGO_USER}")

          # Check user was returned
          USERNAME=$(echo "${USER_JSON}" | jq -r '.username // empty')
          if [[ -z "${USERNAME}" ]]; then
            echo "::error::User '${SFTPGO_USER}' not found in SFTPGo"
            exit 1
          fi

          PASS=true

          # -- quota_size
          QUOTA_SIZE=$(echo "${USER_JSON}" | jq -r '.quota_size // 0')
          if [[ "${QUOTA_SIZE}" != "${EXPECTED_QUOTA_SIZE}" ]]; then
            echo "::error::quota_size regression: got ${QUOTA_SIZE}, expected ${EXPECTED_QUOTA_SIZE}"
            PASS=false
          else
            echo "quota_size: ${QUOTA_SIZE} ✓"
          fi

          # -- max_upload_file_size
          MAX_UPLOAD=$(echo "${USER_JSON}" | jq -r '.max_upload_file_size // 0')
          if [[ "${MAX_UPLOAD}" != "${EXPECTED_MAX_UPLOAD}" ]]; then
            echo "::error::max_upload_file_size regression: got ${MAX_UPLOAD}, expected ${EXPECTED_MAX_UPLOAD}"
            PASS=false
          else
            echo "max_upload_file_size: ${MAX_UPLOAD} ✓"
          fi

          # -- virtual folder assigned
          VF_COUNT=$(echo "${USER_JSON}" | jq '[.virtual_folders[]? | select(.name == env.FOLDER_NAME)] | length')
          if [[ "${VF_COUNT}" -lt 1 ]]; then
            echo "::error::Virtual folder '${FOLDER_NAME}' not assigned to user '${SFTPGO_USER}'"
            PASS=false
          else
            echo "virtual_folder '${FOLDER_NAME}' assigned ✓"
          fi

          # -- virtual folder path
          VF_PATH=$(echo "${USER_JSON}" | jq -r \
            --arg fn "${FOLDER_NAME}" \
            '.virtual_folders[]? | select(.name == $fn) | .virtual_path // empty')
          if [[ "${VF_PATH}" != "${FOLDER_VIRTUAL_PATH}" ]]; then
            echo "::error::Virtual path mismatch: got '${VF_PATH}', expected '${FOLDER_VIRTUAL_PATH}'"
            PASS=false
          else
            echo "virtual_path: ${VF_PATH} ✓"
          fi

          # -- virtual folder quota_size
          VF_QUOTA=$(echo "${USER_JSON}" | jq -r \
            --arg fn "${FOLDER_NAME}" \
            '.virtual_folders[]? | select(.name == $fn) | .quota_size // 0')
          if [[ "${VF_QUOTA}" != "${EXPECTED_QUOTA_SIZE}" ]]; then
            echo "::error::Virtual folder quota_size regression: got ${VF_QUOTA}, expected ${EXPECTED_QUOTA_SIZE}"
            PASS=false
          else
            echo "virtual_folder quota_size: ${VF_QUOTA} ✓"
          fi

          # -- user status active
          STATUS=$(echo "${USER_JSON}" | jq -r '.status // 0')
          if [[ "${STATUS}" != "1" ]]; then
            echo "::error::User '${SFTPGO_USER}' is disabled (status=${STATUS})"
            PASS=false
          else
            echo "user status: active ✓"
          fi

          if [[ "${PASS}" != "true" ]]; then
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Step 5: Idempotency — run setup script in dry-run mode (no ADMIN_PASS)
      #         Just validate it parses + reaches auth step cleanly
      # -----------------------------------------------------------------------
      - name: "[5] Idempotency — validate_api.sh end-to-end regression"
        env:
          ADMIN_PASS: ${{ secrets.SFTPGO_ADMIN_PASS }}
          SFTPGO_USER_PASS: ${{ secrets.SFTPGO_USER_PASS }}
        run: bash validate_api.sh

      # -----------------------------------------------------------------------
      # Step 6: Quota scan — trigger a rescan and confirm it starts cleanly
      # -----------------------------------------------------------------------
      - name: "[6] Quota scan — trigger and verify acceptance"
        run: |
          SCAN_RESPONSE=$(curl -sf --max-time 20 -X POST \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            "${SFTPGO_ADMIN_URL}/api/v2/quotas/users/${SFTPGO_USER}/scan" || echo "FAILED")

          if [[ "${SCAN_RESPONSE}" == "FAILED" ]]; then
            echo "::error::Quota scan request failed for user '${SFTPGO_USER}'"
            exit 1
          fi

          # SFTPGo returns 202 Accepted or a conflict if scan already running
          echo "Quota scan response: ${SCAN_RESPONSE}"
          echo "Quota scan: accepted ✓"

      # -----------------------------------------------------------------------
      # Step 7: Summary output
      # -----------------------------------------------------------------------
      - name: "[7] Summary"
        if: always()
        run: |
          echo "## SFTPGo Validation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Admin auth | See step 1 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Host reachable | See step 2 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Virtual folder exists | See step 3 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quota regression | See step 4 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Idempotency (validate_api.sh) | See step 5 |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Quota scan | See step 6 |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Host: \`${SFTPGO_ADMIN_URL}\` | User: \`${SFTPGO_USER}\` | Folder: \`${FOLDER_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
