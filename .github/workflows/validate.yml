name: Validate SFTPGo Config

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]
  workflow_dispatch:

concurrency:
  group: sftpgo-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Static analysis — no secrets needed, runs fast
  # ---------------------------------------------------------------------------
  lint:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Shellcheck all scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning
          scandir: "."
          additional_files: "sftpgo_setup.sh validate_api.sh file_issue.sh"

  # ---------------------------------------------------------------------------
  # Job 2: Live API validation against neoncovenant.appboxes.co
  # ---------------------------------------------------------------------------
  api-validate:
    name: Live API Checks
    runs-on: ubuntu-latest
    needs: lint
    # Always run the final steps so we can file/resolve issues even on failure
    permissions:
      issues: write
      contents: write   # required for POST /commits/{sha}/comments
    env:
      SFTPGO_ADMIN_URL: "https://home.neoncovenant.appboxes.co"
      ADMIN_USER: "admin"
      SFTPGO_USER: "jofthev"
      FOLDER_NAME: "jofthev_data"
      FOLDER_LOCAL_PATH: "/home/appbox/data/jofthev"
      FOLDER_VIRTUAL_PATH: "/data"
      EXPECTED_QUOTA_SIZE: "1073741824"
      EXPECTED_MAX_UPLOAD: "1073741824"
      REPORT_FILE: "/tmp/sftpgo_failure_report.md"
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install dependencies
        run: sudo apt-get install -y curl jq

      # -----------------------------------------------------------------------
      # Step 1: Auth
      # -----------------------------------------------------------------------
      - name: "[1] Auth — obtain admin JWT"
        id: auth
        env:
          ADMIN_PASS: ${{ secrets.SFTPGO_ADMIN_PASS }}
        run: |
          echo "Testing admin auth against ${SFTPGO_ADMIN_URL}/api/v2/token..."
          RESPONSE=$(curl -sf --max-time 15 \
            -u "${ADMIN_USER}:${ADMIN_PASS}" \
            "${SFTPGO_ADMIN_URL}/api/v2/token")

          TOKEN=$(echo "${RESPONSE}" | jq -r '.access_token // empty')

          if [[ -z "${TOKEN}" ]]; then
            echo "::error::Auth failed — no access_token in response"
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          echo "ADMIN_TOKEN=${TOKEN}" >> "$GITHUB_ENV"
          echo "Admin auth: OK"

      # -----------------------------------------------------------------------
      # Step 2: Reachability
      # -----------------------------------------------------------------------
      - name: "[2] Reachability — API version check"
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --max-time 10 \
            "${SFTPGO_ADMIN_URL}/api/v2/version")
          if [[ "${STATUS}" != "200" ]]; then
            echo "::error::API version endpoint returned HTTP ${STATUS}"
            exit 1
          fi
          echo "Host reachable: HTTP ${STATUS}"

      # -----------------------------------------------------------------------
      # Step 3: Virtual folder existence
      # -----------------------------------------------------------------------
      - name: "[3] Virtual folder — confirm '${FOLDER_NAME}' exists"
        run: |
          RESPONSE=$(curl -sf --max-time 15 \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            "${SFTPGO_ADMIN_URL}/api/v2/folders/${FOLDER_NAME}" || echo "NOT_FOUND")

          if echo "${RESPONSE}" | jq -e '.name' &>/dev/null; then
            MAPPED=$(echo "${RESPONSE}" | jq -r '.mapped_path')
            echo "Folder '${FOLDER_NAME}' exists. Mapped path: ${MAPPED}"
            if [[ "${MAPPED}" != "${FOLDER_LOCAL_PATH}" ]]; then
              echo "::warning::Mapped path mismatch — got '${MAPPED}', expected '${FOLDER_LOCAL_PATH}'"
            fi
          else
            echo "::error::Virtual folder '${FOLDER_NAME}' not found"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Step 4: User quota assertions
      # -----------------------------------------------------------------------
      - name: "[4] User config — quota and virtual folder assertions"
        run: |
          USER_JSON=$(curl -sf --max-time 15 \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            "${SFTPGO_ADMIN_URL}/api/v2/users/${SFTPGO_USER}")

          USERNAME=$(echo "${USER_JSON}" | jq -r '.username // empty')
          if [[ -z "${USERNAME}" ]]; then
            echo "::error::User '${SFTPGO_USER}' not found"
            exit 1
          fi

          PASS=true

          QUOTA_SIZE=$(echo "${USER_JSON}" | jq -r '.quota_size // 0')
          [[ "${QUOTA_SIZE}" == "${EXPECTED_QUOTA_SIZE}" ]] \
            && echo "quota_size: ${QUOTA_SIZE} ✓" \
            || { echo "::error::quota_size regression: got ${QUOTA_SIZE}, expected ${EXPECTED_QUOTA_SIZE}"; PASS=false; }

          MAX_UPLOAD=$(echo "${USER_JSON}" | jq -r '.max_upload_file_size // 0')
          [[ "${MAX_UPLOAD}" == "${EXPECTED_MAX_UPLOAD}" ]] \
            && echo "max_upload_file_size: ${MAX_UPLOAD} ✓" \
            || { echo "::error::max_upload_file_size regression: got ${MAX_UPLOAD}, expected ${EXPECTED_MAX_UPLOAD}"; PASS=false; }

          VF_COUNT=$(echo "${USER_JSON}" | jq --arg fn "${FOLDER_NAME}" \
            '[.virtual_folders[]? | select(.name == $fn)] | length')
          [[ "${VF_COUNT}" -ge 1 ]] \
            && echo "virtual_folder '${FOLDER_NAME}' assigned ✓" \
            || { echo "::error::Virtual folder '${FOLDER_NAME}' not assigned to user"; PASS=false; }

          VF_PATH=$(echo "${USER_JSON}" | jq -r --arg fn "${FOLDER_NAME}" \
            '.virtual_folders[]? | select(.name == $fn) | .virtual_path // empty')
          [[ "${VF_PATH}" == "${FOLDER_VIRTUAL_PATH}" ]] \
            && echo "virtual_path: ${VF_PATH} ✓" \
            || { echo "::error::virtual_path mismatch: got '${VF_PATH}', expected '${FOLDER_VIRTUAL_PATH}'"; PASS=false; }

          VF_QUOTA=$(echo "${USER_JSON}" | jq -r --arg fn "${FOLDER_NAME}" \
            '.virtual_folders[]? | select(.name == $fn) | .quota_size // 0')
          [[ "${VF_QUOTA}" == "${EXPECTED_QUOTA_SIZE}" ]] \
            && echo "virtual_folder quota_size: ${VF_QUOTA} ✓" \
            || { echo "::error::Virtual folder quota_size regression: got ${VF_QUOTA}, expected ${EXPECTED_QUOTA_SIZE}"; PASS=false; }

          STATUS=$(echo "${USER_JSON}" | jq -r '.status // 0')
          [[ "${STATUS}" == "1" ]] \
            && echo "user status: active ✓" \
            || { echo "::error::User '${SFTPGO_USER}' is disabled (status=${STATUS})"; PASS=false; }

          [[ "${PASS}" == "true" ]] || exit 1

      # -----------------------------------------------------------------------
      # Step 5: validate_api.sh end-to-end — produces structured report on failure
      # -----------------------------------------------------------------------
      - name: "[5] validate_api.sh — end-to-end regression"
        id: validate
        env:
          ADMIN_PASS: ${{ secrets.SFTPGO_ADMIN_PASS }}
          SFTPGO_USER_PASS: ${{ secrets.SFTPGO_USER_PASS }}
        run: bash validate_api.sh

      # -----------------------------------------------------------------------
      # Step 6: Quota scan
      # -----------------------------------------------------------------------
      - name: "[6] Quota scan — trigger and verify acceptance"
        run: |
          SCAN_HTTP=$(curl -so /dev/null -w "%{http_code}" --max-time 20 -X POST \
            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
            "${SFTPGO_ADMIN_URL}/api/v2/quotas/users/${SFTPGO_USER}/scan" || echo "000")

          case "${SCAN_HTTP}" in
            200|202|409) echo "Quota scan: HTTP ${SCAN_HTTP} ✓" ;;
            *) echo "::error::Quota scan returned unexpected HTTP ${SCAN_HTTP}"; exit 1 ;;
          esac

      # -----------------------------------------------------------------------
      # Step 7: Step summary (always runs)
      # -----------------------------------------------------------------------
      - name: "[7] Step summary"
        if: always()
        run: |
          STATUS_ICON="${{ job.status == 'success' && '✅' || '❌' }}"
          {
            echo "## ${STATUS_ICON} SFTPGo Validation — ${{ job.status }}"
            echo ""
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Shellcheck lint | ${{ needs.lint.result }} |"
            echo "| Admin auth | See step 1 |"
            echo "| Host reachable | See step 2 |"
            echo "| Virtual folder exists | See step 3 |"
            echo "| Quota regression | See step 4 |"
            echo "| validate_api.sh | See step 5 |"
            echo "| Quota scan | See step 6 |"
            echo ""
            echo "**Host:** \`${SFTPGO_ADMIN_URL}\` | **User:** \`${SFTPGO_USER}\` | **Folder:** \`${FOLDER_NAME}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------------
      # Step 8: File GitHub issue on failure (only on push to master, not PRs)
      # -----------------------------------------------------------------------
      - name: "[8] File regression issue"
        if: |
          failure() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        env:
          ADMIN_PASS: ${{ secrets.SFTPGO_ADMIN_PASS }}
          SFTPGO_USER_PASS: ${{ secrets.SFTPGO_USER_PASS }}
        run: |
          # Re-run validate_api.sh in report-only mode if the report wasn't
          # generated yet (e.g. failure happened in steps 1-4 or 6 before
          # validate_api.sh ran). Suppress exit code — we just want the report.
          if [[ ! -s "${REPORT_FILE}" ]]; then
            echo "Report not found — generating via validate_api.sh (best effort)..."
            bash validate_api.sh || true
          fi
          bash file_issue.sh

      # -----------------------------------------------------------------------
      # Step 9: Close resolved issues on success (only on push to master)
      # -----------------------------------------------------------------------
      - name: "[9] Close resolved regression issues"
        if: |
          success() &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        run: bash file_issue.sh --resolve
